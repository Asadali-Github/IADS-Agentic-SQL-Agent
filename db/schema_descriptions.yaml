version: 1
tables:
  customers:
    description: One row per registered customer. The master record every order links
      back to.
    grain: One row per customer.
    columns:
      customer_id:
        description: Unique identifier for a customer; referenced by orders.
        type: NUMBER
        pk: true
      full_name:
        description: Customer's full display name. May be personal data - never surface
          in logs unredacted.
        type: VARCHAR2(200)
        pii: true
      country_code:
        description: Country the customer registered from.
        type: CHAR(2)
        units: ISO 3166-1 alpha-2
        sample_values:
        - GB
        - US
        - FR
        - DE
        - IE
      created_at:
        description: When the customer account was created.
        type: TIMESTAMP
        timezone: UTC
  orders:
    description: One row per placed order. The central fact table for revenue questions.
    grain: One row per order.
    columns:
      order_id:
        description: Unique identifier for an order.
        type: NUMBER
        pk: true
      customer_id:
        description: The customer who placed the order; foreign key to customers.
        type: NUMBER
        fk: customers.customer_id
      order_date:
        description: Calendar date the order was placed. Used for all date filtering.
        type: DATE
        timezone: UTC
      status:
        description: Lifecycle state of the order.
        type: VARCHAR2(20)
        sample_values:
        - placed
        - paid
        - shipped
        - delivered
        - cancelled
        - refunded
      total_gbp:
        description: Total order value. The canonical "revenue" measure - SUM this
          for revenue/sales/turnover questions.
        type: NUMBER(12,2)
        currency: GBP
        units: pounds sterling
