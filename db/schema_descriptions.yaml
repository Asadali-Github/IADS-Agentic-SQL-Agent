# One entry per table. Each table has:
#   description : 1–2 sentences in business language
#   primary_key : column name
#   columns     : list of column descriptions
#
# Quality bar: a non-technical reader should be able to understand the
# meaning of every column from the description alone. Mention units, time
# zones, currencies, encoding standards.

