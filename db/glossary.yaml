# Business glossary — synonyms the agent maps to canonical column names.
# Status: scaffold — fill in during the hackathon.
# Owner: Asad
#
# Format:
#   canonical_term:
#     description: what this term means in our business
#     synonyms: [list, of, phrasings, users, might, say]
#     maps_to: dotted column reference (table.column)
#
# Why this exists:
#   Users say "revenue" or "sales" or "turnover" — all the same column.
#   The agent uses this glossary as additional retrieval signal so the
#   right column is picked regardless of the user's wording.

terms: []

# Example:
#
# terms:
#   revenue:
#     description: Total order value in pounds sterling, including VAT.
#     synonyms: [sales, turnover, gross, income, takings]
#     maps_to: orders.total_gbp
#
#   region:
#     description: ISO country code where the customer is based.
#     synonyms: [country, market, geography, territory]
#     maps_to: customers.country_code
