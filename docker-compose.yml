version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./app:/app/app
      - ./evaluation:/app/evaluation
      - ./prompts:/app/prompts
      - ./db:/app/db
      - ./data:/app/data
      # Mount the ADB wallet read-only; never bake it into the image.
      - ./wallet:/app/wallet:ro
    environment:
      PYTHONPATH: /app:/app/src
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    command: uvicorn sql_agent.api.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      API_URL: http://api:8000
    depends_on:
      - api
    command: streamlit run frontend/streamlit_app.py --server.address 0.0.0.0
